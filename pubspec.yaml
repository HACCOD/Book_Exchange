name: book_exchange
description: A student book exchange platform to buy, sell, and exchange used books.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  uuid: ^4.3.3
  timeago: ^3.6.1
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/intro_algorithms.jpg
    - assets/images/calculus_stewart.jpg
    - assets/images/os_concepts.jpg
    - assets/images/engineering_mechanics.jpg
    - assets/images/database_systems.jpg
    - assets/images/linear_algebra.jpg
